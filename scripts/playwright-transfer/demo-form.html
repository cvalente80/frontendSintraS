<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Demo Playwright Transfer</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f3f4f6;
        color: #111827;
        margin: 0;
        padding: 32px;
      }
      .card {
        max-width: 640px;
        margin: 0 auto;
        background: #ffffff;
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 10px 30px rgba(17, 24, 39, 0.08);
      }
      h1 {
        margin-top: 0;
      }
      form {
        display: grid;
        gap: 16px;
      }
      label {
        display: grid;
        gap: 6px;
        font-weight: 600;
      }
      input[type='text'],
      input[type='email'],
      input[type='tel'] {
        border: 1px solid #d1d5db;
        border-radius: 10px;
        padding: 12px;
        font-size: 14px;
      }
      button {
        border: 0;
        border-radius: 10px;
        background: #1d4ed8;
        color: #ffffff;
        padding: 12px 16px;
        font-weight: 700;
        cursor: pointer;
      }
      [data-testid='simulation-result'] {
        margin-top: 20px;
        padding: 16px;
        border-radius: 12px;
        background: #dcfce7;
        color: #166534;
      }
      [hidden] {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Demo local de transferência</h1>
      <p>Esta página existe para validar o fluxo Playwright com Gherkin e controlo de steps.</p>

      <form id="simulation-form">
        <label>
          Matrícula
          <input id="plate" name="plate" type="text" />
        </label>

        <label>
          Código postal
          <input id="postalCode" name="postalCode" type="text" />
        </label>

        <label>
          Data de nascimento
          <input id="birthDate" name="birthDate" type="text" />
        </label>

        <label>
          Email
          <input id="email" name="email" type="email" />
        </label>

        <label>
          Telemóvel
          <input id="phone" name="phone" type="tel" />
        </label>

        <label>
          <input id="consent" name="consent" type="checkbox" />
          Aceito o tratamento dos dados para a simulação
        </label>

        <button type="submit">Simular</button>
      </form>

      <section data-testid="simulation-result" hidden></section>
    </main>

    <script>
      const form = document.querySelector('#simulation-form');
      const result = document.querySelector('[data-testid="simulation-result"]');

      form.addEventListener('submit', (event) => {
        event.preventDefault();

        const data = new FormData(form);
        const plate = data.get('plate') || 'sem matrícula';
        const postalCode = data.get('postalCode') || 'sem código postal';
        const email = data.get('email') || 'sem email';

        result.hidden = false;
        result.textContent = `Simulação recebida para ${plate}. Código postal ${postalCode}. Contacto ${email}.`;
      });
    </script>
  </body>
</html>
